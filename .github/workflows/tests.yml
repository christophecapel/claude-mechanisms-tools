name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run worktree-edit-gate test suite
        run: python3 -m unittest tests.test_worktree_edit_gate -v

      - name: Run plan-review-gate test suite
        run: python3 -m unittest tests.test_plan_review_gate -v

      - name: Run error-audit test suite
        run: python3 -m unittest tests.test_error_audit -v

      - name: Run feedback-memory-gate test suite
        run: python3 -m unittest tests.test_feedback_memory_gate -v

      - name: Run git-workflow-gate test suite
        run: python3 -m unittest tests.test_git_workflow_gate -v
