# tools.yaml
#
# Declarative manifest of every tool in this repo with bidirectional cross-links
# to the mechanisms it implements.
#
# Pairs with claude-mechanisms/mechanisms.yaml — every mechanism_id here must
# resolve in mechanisms.yaml; every claude-mechanisms `implementations:` entry
# must resolve to a real path in this repo.
#
# v0.1 verifies cross-link integrity manually at PR review time.
# v0.1.1 will add `cross_manifest_id_match` strategy to repo-pair-drift-gate.py.

version: 1
updated: 2026-05-09
mechanisms_source: github.com/christophecapel/claude-mechanisms
release: v0.3.0

tools:
  - id: check
    name: "/check — session-close audit"
    file: skills/check/check.md
    skill_file: skills/check/SKILL.md
    kind: skill
    introduced: v0.1.0
    mechanism_ids: [16, 11, 1]
    description: "Session-scoped manifest, two-section open items, decisive close signal. Pre-render check validates PR-merge dependencies before flagging rows as blocked."

  - id: worktree-edit-gate
    name: "worktree-edit-gate — pre-edit guard"
    file: hooks/worktree-edit-gate.py
    install_script: hooks/install-hook.sh
    kind: hook
    hook_event: PreToolUse
    hook_matcher: "Edit|Write|MultiEdit|NotebookEdit"
    introduced: v0.1.0
    mechanism_ids: [17, 11]
    description: "Warns when an absolute-path edit targets a location inside the parent repo but outside the currently active worktree. Catches the silent-miss failure where edits intended for a worktree branch land in the main checkout instead."

  - id: press1-check
    name: "/press1-check — Bash permission audit"
    file: skills/press1-check/audit-permissions.py
    skill_file: skills/press1-check/SKILL.md
    kind: skill+script
    introduced: v0.1.0
    mechanism_ids: [21, 19]
    description: "Surface LOW-risk Bash commands that should be allow-listed. State-tracked to avoid re-surfacing already-reviewed commands. Absorbs the previously standalone claude-code-press1-check repo (archived 2026-05-08)."

  - id: plan-review-gate
    name: "plan-review-gate — Phase 1 ExitPlanMode + Phase 2 PR diff audit"
    file: hooks/plan-review-gate.py
    install_script: hooks/install-plan-review-gate.sh
    kind: hook
    hook_event: PreToolUse
    hook_matcher: "ExitPlanMode|Bash"
    introduced: v0.2.0
    mechanism_ids: [14, 16, 17]
    description: "Two-phase plan discipline gate. Phase 1 blocks ExitPlanMode if the plan is missing required sections (Context, Implementation, Tests, Verification, Pre-flight, Files). Phase 2 blocks `gh pr create` if the PR diff is missing files the plan claimed it would touch. Hardened in CC-174 (head-branch-aware diff resolution) and CC-175 (token-aware command matcher via shlex)."

  - id: plan-archive
    name: "/plan-archive — link plan-mode files to merged PRs"
    file: skills/plan-archive/plan-archive.py
    skill_file: skills/plan-archive/SKILL.md
    kind: skill+script
    introduced: v0.2.0
    mechanism_ids: [5]
    description: "Plans accumulate on every ExitPlanMode. This skill groups them by the merged PR that executed them and moves the bundle into ~/.claude/plans/archive/by-pr/PR-<num>-<branch>/, with _meta.yaml linking back to PR + Linear tickets + commits."

  - id: error-audit
    name: "/error-audit — cross-session error audit"
    file: skills/error-audit/error-audit.py
    skill_file: skills/error-audit/SKILL.md
    kind: skill+script
    introduced: v0.3.0
    mechanism_ids: [19, 21]
    description: "Scans every Claude Code session transcript under ~/.claude/projects/*.jsonl for 7 error classes (tool_error, validation_error, permission_denial, hook_block, bash_fail, retry_storm, read_before_edit), clusters by root-cause signature, and surfaces top N with suggested remediation tiers. Suppressions file ships with the toolkit; CLAUDE_ERROR_AUDIT_SUPPRESSIONS env var overrides path."
